name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace

  e2e:
    name: E2E Tests (Godot)
    runs-on: ubuntu-latest
    needs: check
    env:
      GODOT_VERSION: "4.6"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build GDExtension (debug)
        run: cargo build -p spectator-godot

      - name: Deploy GDExtension to test project
        run: |
          mkdir -p tests/godot-project/addons/spectator/bin/linux
          cp target/debug/libspectator_godot.so \
            tests/godot-project/addons/spectator/bin/linux/

      - name: Download Godot ${{ env.GODOT_VERSION }} headless
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          chmod +x "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64"
          echo "GODOT_BIN=$PWD/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" >> $GITHUB_ENV

      - name: Import Godot test project
        run: |
          "$GODOT_BIN" --headless --import --quit --path tests/godot-project 2>&1 || true

      - name: Run E2E journey tests
        run: |
          cargo test -p spectator-server --test e2e_journeys \
            -- --include-ignored --nocapture

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build Spectator server (release)
        run: cargo build --release -p spectator-server

      - name: Build Director server (release)
        run: cargo build --release -p director

      - name: Build GDExtension (release)
        run: cargo build --release -p spectator-godot
